<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit" />
    <meta name="description" content="AIO Local Desktop Admin" />
    <meta name="keywords" content="AIO Tauri Desktop Admin" />
    <meta name="author" content="zjarlin" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=0"
    />
    <!-- 由 vite 注入 VITE_APP_TITLE 变量，在 .env 文件内配置 -->
    <title><%= VITE_APP_TITLE %></title>
    <link rel="icon" href="/favicon.ico" />
    <script>
      (function () {
        var namespace = '<%= VITE_APP_NAMESPACE %>-';
        var keys = [];
        try {
          for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (
              key &&
              key.startsWith(namespace) &&
              key.includes('-preferences')
            ) {
              keys.push(key);
            }
          }
          for (var j = 0; j < keys.length; j++) {
            var key = keys[j];
            if (key.endsWith('-preferences-theme')) {
              localStorage.setItem(key, JSON.stringify({ value: 'light' }));
              continue;
            }
            if (!key.endsWith('-preferences')) {
              continue;
            }
            var raw = localStorage.getItem(key);
            if (!raw) {
              continue;
            }
            var parsed = JSON.parse(raw);
            if (
              parsed &&
              parsed.value &&
              parsed.value.theme &&
              parsed.value.theme.mode !== 'light'
            ) {
              parsed.value.theme.mode = 'light';
              localStorage.setItem(key, JSON.stringify(parsed));
            }
          }
        } catch {}
        document.documentElement.classList.remove('dark');
      })();
    </script>
    <script>
      // 生产环境下注入百度统计
      if (window._VBEN_ADMIN_PRO_APP_CONF_) {
        var _hmt = _hmt || [];
        (function () {
          var hm = document.createElement('script');
          hm.src =
            'https://hm.baidu.com/hm.js?97352b16ed2df8c3860cf5a1a65fb4dd';
          var s = document.getElementsByTagName('script')[0];
          s.parentNode.insertBefore(hm, s);
        })();
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
